<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" type="text/css" href="css/skeleton.css">
  <link rel="stylesheet" type="text/css" href="css/common.css">
  <link rel="stylesheet" type="text/css" href="css/home.css">
  <title>导航</title>
</head>
<body>
  <script src="js/home.js"></script>
  <script src="js/rain.js"></script>
  <script>
    function toggleRain() {
      var btn = document.getElementById('rainToggle');
      if (window.digitalRain) {
        if (window.digitalRain.intervalId) {
          window.digitalRain.stopAnimation();
          btn.textContent = '☀️';
          btn.title = '开启雨效果';
          btn.classList.add('rain-off');
          localStorage.setItem('rainEnabled', 'false');
        } else {
          window.digitalRain.startAnimation();
          btn.textContent = '🌧';
          btn.title = '关闭雨效果';
          btn.classList.remove('rain-off');
          localStorage.setItem('rainEnabled', 'true');
        }
      }
    }
  </script>
  <canvas id="ad"></canvas>
  <div class="app">
    <header>
      <nav>
        <div class="logo"><a href="index.html"><img src="png/logo.png" alt="x">kazer</a></div>
        <button id="rainToggle" class="rain-toggle" onclick="toggleRain()" title="关闭雨效果">🌧</button>
        <!-- 开启: 🌧 关闭雨效果 | 关闭: ☀️ 开启雨效果 -->
      </nav>
    </header>
    <main class="main">
      <!-- 搜索 -->
      <div id="searchForm" class="search-form">
        <select id="searchType" class="search-type" onchange="onSearchTypeChange()">
          <option value="bing">bing</option>
          <option value="baidu">Baidu</option>
          <option value="google">Google</option>
        </select>
        <input
          type="text"
          lang="zh-CN"
          id="searchText"
          autocomplete="off"
          class="search-text"
          autofocus="autofocus"
          onkeydown="event.keyCode==13 && onSearch()"
        />
        <input type="button" value=" " onclick="onSearch()" class="search-btn" />
      </div>
      <!-- 导航 -->
      <ul class="categorys">
        <!--%LINKS%-->
      </ul>
    </main>
  </div>
</body>
</html>
